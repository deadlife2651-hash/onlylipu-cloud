# এই ফাইলটা .github/workflows/build-apk.yml হিসেবে রাখুন
# (GitHub ওয়েবে: ফাইল খুলে Edit → ফাইলনেমের জায়গায় লিখুন
#  .github/workflows/build-apk.yml → Commit changes)
name: Build OnlyLipu Cloud APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Create local.properties
        working-directory: android-app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ONLYLIPU_SERVER_URL=${{ vars.SERVER_URL || 'https://149.28.20.169.sslip.io' }}" >> local.properties

      - name: Build Debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OnlyLipuCloud-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
